server:
  port: 10080
spring:
  main:
    web-application-type: REACTIVE
  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: false # Disable Swagger UI in favor of Scalar
  show-actuator: true

scalar:
  enabled: true
  path: /scalar
  openapi:
    url: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info, metrics
  metrics:
    tags:
      application: zombie-listener

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: zombie-listener
