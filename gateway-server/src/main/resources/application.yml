server:
  port: 9000

spring:
  cloud:
    gateway:
      routes:
        - id: zombie-listener
          uri: http://zombie-listener:80
          predicates:
            - Path=/zombie/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info, metrics
  metrics:
    tags:
      application: gateway-server

logging:
  level:
    org.springframework.cloud.gateway: TRACE
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: gateway-server
